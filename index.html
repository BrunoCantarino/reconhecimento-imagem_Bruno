<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teachable Machine</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #e8f5e9, #ffffff);
            min-height: 100vh;
        }

        .card-custom {
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border: none;
        }

        #webcam-container canvas {
            width: 100% !important;
            max-width: 320px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.15);
        }

        /* BOTÃO ESTILIZADO */
        .btn-camera {
            background: linear-gradient(135deg, #4caf50, #2e7d32);
            border: none;
            padding: 12px 20px;
            font-size: 1.1rem;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(76,175,80,0.4);
        }

        .btn-camera:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(76,175,80,0.6);
        }

        .btn-camera:active {
            transform: scale(0.98);
        }

        .prediction-item {
            margin-bottom: 15px;
        }

        .progress {
            height: 20px;
            border-radius: 10px;
            background-color: #e0e0e0;
            overflow: hidden;
        }

        .progress-bar {
            font-size: 0.75rem;
            font-weight: bold;
        }

        .label-text {
            font-weight: 600;
            margin-bottom: 5px;
        }
    </style>
</head>

<body>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-12 col-md-8 col-lg-6">

            <div class="card card-custom p-4 text-center">

                <h2 class="mb-2">🤖 Reconhecimento de Cores Online</h2>
                <p class="text-muted mb-4">Reconhecimento em tempo real</p>

                <button class="btn btn-camera mb-4" onclick="init()">
                    📷 Permitir acesso à câmera
                </button>

                <div id="webcam-container" class="d-flex justify-content-center mb-4"></div>

                <div id="label-container" class="text-start"></div>

            </div>

        </div>
    </div>
</div>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

<script>
    const URL = "./my_model/";

    let model, webcam, labelContainer, maxPredictions;

    async function init() {
        const modelURL = URL + "model.json";
        const metadataURL = URL + "metadata.json";

        model = await tmImage.load(modelURL, metadataURL);
        maxPredictions = model.getTotalClasses();

        const flip = true;
        webcam = new tmImage.Webcam(320, 320, flip);

        await webcam.setup();
        await webcam.play();
        window.requestAnimationFrame(loop);

        const webcamContainer = document.getElementById("webcam-container");
        webcamContainer.innerHTML = "";
        webcamContainer.appendChild(webcam.canvas);

        labelContainer = document.getElementById("label-container");
        labelContainer.innerHTML = "";

        for (let i = 0; i < maxPredictions; i++) {
            const div = document.createElement("div");
            div.classList.add("prediction-item");

            div.innerHTML = `
                <div class="label-text">Classe</div>
                <div class="progress">
                    <div class="progress-bar bg-success" style="width: 0%">0%</div>
                </div>
            `;

            labelContainer.appendChild(div);
        }
    }

    async function loop() {
        webcam.update();
        await predict();
        window.requestAnimationFrame(loop);
    }

    async function predict() {
        const prediction = await model.predict(webcam.canvas);

        for (let i = 0; i < maxPredictions; i++) {
            const prob = (prediction[i].probability * 100).toFixed(1);

            const item = labelContainer.childNodes[i];
            const label = item.querySelector(".label-text");
            const bar = item.querySelector(".progress-bar");

            label.innerHTML = prediction[i].className;
            bar.style.width = prob + "%";
            bar.innerHTML = prob + "%";
        }
    }
</script>

</body>
</html>
